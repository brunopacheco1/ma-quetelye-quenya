name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. v1.0.1)'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          DATE=$(date +'%Y-%m-%d')
          
          # Ensure version starts with v
          if [[ $VERSION != v* ]]; then
            VERSION="v$VERSION"
          fi
          
          python3 -c "
          import subprocess
          import sys
          import re

          version = '$VERSION'
          date = '$DATE'

          # Get previous tag to determine commit range
          try:
              prev_tag = subprocess.check_output(['git', 'describe', '--tags', '--abbrev=0'], stderr=subprocess.DEVNULL).decode().strip()
              cmd = ['git', 'log', f'{prev_tag}..HEAD', '--pretty=format:%s']
          except Exception:
              cmd = ['git', 'log', '--pretty=format:%s']

          commits_out = subprocess.run(cmd, capture_output=True, text=True).stdout.strip()
          commits = commits_out.split('\n') if commits_out else []

          categories = {
              'Added': [],
              'Changed': [],
              'Deprecated': [],
              'Removed': [],
              'Fixed': [],
              'Security': []
          }

          for commit in commits:
              commit = commit.strip()
              if not commit: continue
              
              match = re.match(r'^([\w\-]+)(?:\([^)]+\))?:\s*(.*)', commit)
              if match:
                  prefix = match.group(1).lower()
                  msg = match.group(2)
              else:
                  prefix = 'unknown'
                  msg = commit

              if prefix == 'feat':
                  categories['Added'].append(msg)
              elif prefix == 'fix':
                  categories['Fixed'].append(msg)
              elif prefix in ('deprecate', 'deprecated'):
                  categories['Deprecated'].append(msg)
              elif prefix in ('remove', 'removed', 'drop'):
                  categories['Removed'].append(msg)
              elif prefix in ('sec', 'security'):
                  categories['Security'].append(msg)
              else:
                  # catch-all for chore, docs, test, build, refactor, perf, etc.
                  categories['Changed'].append(msg)

          block = f'## [{version}] - {date}\n\n'
          for cat, items in categories.items():
              if items:
                  block += f'### {cat}\n\n'
                  for item in items:
                      block += f'- {item}\n'
                  block += '\n'

          if block.endswith('\n\n\n'):
              block = block[:-1]

          with open('CHANGELOG.md', 'r') as f:
              lines = f.readlines()

          for i, line in enumerate(lines):
              if 'Semantic Versioning' in line:
                  lines.insert(i + 1, '\n' + block)
                  break

          with open('CHANGELOG.md', 'w') as f:
              f.writelines(lines)
          "

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: release/${{ github.event.inputs.version }}
          title: "Release ${{ github.event.inputs.version }}"
          body: "This PR was automatically generated to prepare for release ${{ github.event.inputs.version }}. Please review and fill in the changelog before merging."
          labels: release
          commit-message: "chore: prepare release ${{ github.event.inputs.version }}"
